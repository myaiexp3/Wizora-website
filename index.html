<script type="text/babel">
// ─── Hero ───────────────────────────────────────────────────────────────────
const TOTAL = 20;
const lerp = (a, b, t) => a * (1 - t) + b * t;
const clamp = (v, lo, hi) => Math.min(Math.max(v, lo), hi);

const PHOTO = [
  ["#1FD8BC","#0B8C7B"],["#3B4B5B","#1E2A33"],["#E8CBA9","#C99B6E"],
  ["#86C7BE","#3E9183"],["#9AA7C7","#5E6E96"],["#1FD8BC","#147F8A"],
  ["#E8978B","#C76A5A"],["#0B8C7B","#062b27"],["#C7D4D0","#8AA39D"],
  ["#2FB6C9","#13707E"],
];
const PLATFORMS = ["Instagram","TikTok","X","Facebook","LinkedIn","YouTube","Threads","Pinterest"];

function PostCard({ i, target }) {
  const [a, b] = PHOTO[i % PHOTO.length];
  const plat = PLATFORMS[i % PLATFORMS.length];
  const st = {
    transform: `translate(-50%,-50%) translate(${target.x}px,${target.y}px) rotate(${target.rotation}deg) scale(${target.scale})`,
    opacity: target.opacity,
    left: "50%", top: "50%",
  };
  return (
    <div className="card" style={st}>
      <div className="card-inner">
        <div className="face face-front">
          <div className="face-photo" style={{ background: `linear-gradient(150deg,${a},${b})` }}></div>
          <div className="face-meta">
            <div className="face-av" style={{ background: `linear-gradient(140deg,${a},${b})` }}></div>
            <div className="face-bars">
              <div className="face-bar a"></div>
              <div className="face-bar b"></div>
            </div>
            <svg className="face-heart" viewBox="0 0 24 24" fill="#0b1a18"><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5.5 6 5.5c2 0 3.2 1.3 4 2.4.8-1.1 2-2.4 4-2.4 3.5 0 5 3.5 3.5 6.5C19 16.5 12 21 12 21z"/></svg>
          </div>
        </div>
        <div className="face face-back">
          <div style={{ textAlign:"center" }}>
            <div className="pf">{plat}</div>
            <div className="pn">View post</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function Hero() {
  const stageRef = React.useRef(null);
  const heroRef = React.useRef(null);
  const [size, setSize] = React.useState({ width:0, height:0 });
  const [phase, setPhase] = React.useState("scatter");
  const [morph, setMorph] = React.useState(0);
  const [shuffle, setShuffle] = React.useState(0);
  const [parallax, setParallax] = React.useState(0);
  const [progress, setProgress] = React.useState(0);

  const scatter = React.useMemo(() =>
    Array.from({ length: TOTAL }, () => ({
      x: (Math.random() - 0.5) * 1400,
      y: (Math.random() - 0.5) * 900,
      rotation: (Math.random() - 0.5) * 160,
      scale: 0.6, opacity: 0,
    })), []);

  React.useEffect(() => {
    const el = stageRef.current;
    if (!el) return;
    const ro = new ResizeObserver(([e]) =>
      setSize({ width: e.contentRect.width, height: e.contentRect.height }));
    ro.observe(el);
    setSize({ width: el.offsetWidth, height: el.offsetHeight });
    return () => ro.disconnect();
  }, []);

  React.useEffect(() => {
    const t1 = setTimeout(() => setPhase("line"), 450);
    const t2 = setTimeout(() => setPhase("circle"), 2100);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  React.useEffect(() => {
    let raf = 0;
    const onScroll = () => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        raf = 0;
        const hero = heroRef.current;
        if (!hero) return;
        const rect = hero.getBoundingClientRect();
        const scrollable = hero.offsetHeight - window.innerHeight;
        const p = clamp(-rect.top / scrollable, 0, 1);
        setProgress(p);
        setMorph(clamp(p / 0.62, 0, 1));
        setShuffle(clamp((p - 0.62) / 0.38, 0, 1));
      });
    };
    window.addEventListener("scroll", onScroll, { passive:true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  React.useEffect(() => {
    const el = stageRef.current;
    if (!el) return;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      const nx = ((e.clientX - r.left) / r.width) * 2 - 1;
      setParallax(nx * 60);
    };
    el.addEventListener("mousemove", onMove);
    return () => el.removeEventListener("mousemove", onMove);
  }, []);

  const targets = React.useMemo(() => {
    return Array.from({ length: TOTAL }, (_, i) => {
      if (phase === "scatter") return scatter[i];
      if (phase === "line") {
        const sp = 70, total = TOTAL * sp;
        return { x: i * sp - total / 2, y: 0, rotation: 0, scale: 1, opacity: 1 };
      }
      const W = size.width, H = size.height;
      const isMobile = W < 768;
      const minD = Math.min(W, H);
      const cR = Math.min(minD * 0.34, 330);
      const cAng = (i / TOTAL) * 360;
      const cRad = (cAng * Math.PI) / 180;
      const circle = { x: Math.cos(cRad) * cR, y: Math.sin(cRad) * cR, rotation: cAng + 90 };
      const baseR = Math.min(W, H * 1.5);
      const arcR = baseR * (isMobile ? 1.4 : 1.05);
      const apexY = H * (isMobile ? 0.34 : 0.22);
      const arcCY = apexY + arcR;
      const spread = isMobile ? 110 : 132;
      const start = -90 - spread / 2;
      const step = spread / (TOTAL - 1);
      const bounded = -shuffle * (spread * 0.55);
      const ang = start + i * step + bounded;
      const aRad = (ang * Math.PI) / 180;
      const arc = {
        x: Math.cos(aRad) * arcR + parallax * (1 - morph * 0.4),
        y: Math.sin(aRad) * arcR + arcCY,
        rotation: ang + 90,
        scale: isMobile ? 1.35 : 1.7,
      };
      return {
        x: lerp(circle.x + parallax, arc.x, morph),
        y: lerp(circle.y, arc.y, morph),
        rotation: lerp(circle.rotation, arc.rotation, morph),
        scale: lerp(1, arc.scale, morph),
        opacity: 1,
      };
    });
  }, [phase, size, morph, shuffle, parallax, scatter]);

  const lift = -morph * 90;
  const introOpacity = 1 - clamp(morph / 0.5, 0, 1);
  const arcOpacity = clamp((morph - 0.55) / 0.4, 0, 1);

  return (
    <section className="hero" ref={heroRef}>
      <div className="hero-stage" ref={stageRef}>
        <div className="hero-grid"></div>
        <div className="stage-cards">
          {targets.map((t, i) => <PostCard key={i} i={i} target={t}/>)}
        </div>
        <div className="hero-copy" style={{ transform:`translate(-50%,calc(-50% + ${lift}px))` }}>
          <span className="eyebrow">AI marketing autopilot</span>
          <h1>Every channel.<br/><span className="gl">One AI</span> that runs it.</h1>
          <p style={{ opacity:introOpacity, height:arcOpacity>0.1?0:"auto", marginTop:arcOpacity>0.1?0:20, overflow:"hidden", transition:"opacity .4s" }}>
            Wizora generates and publishes your content, optimises your ads and SEO, replies to comments and reviews — and turns it all into leads.
          </p>
          <p style={{ opacity:arcOpacity, position:arcOpacity<0.5?"absolute":"static", pointerEvents:"none", transition:"opacity .4s" }}>
            Create, publish, optimise, reply, repeat — automatically, across every account.
          </p>
          <div className="hero-actions">
            <button className="btn btn-primary btn-lg" onClick={() => window.dispatchEvent(new Event("wizora:signup"))}>
              Get started free
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            </button>
            <a className="btn btn-ghost btn-lg" href="#how" style={{ color:"var(--hero-ink)", boxShadow:"inset 0 0 0 1px var(--hero-line)", background:"rgba(11,26,24,.04)" }}>See how it works</a>
          </div>
        </div>
        <div className="hero-scroll" style={{ opacity: 1 - clamp(progress / 0.2, 0, 1) }}>
          <span>Scroll</span>
          <span className="line"></span>
        </div>
        <div className="hero-fade"></div>
      </div>
    </section>
  );
}

function Constellation() {
  const R = 46;
  const nodes = PLAT.map((p, i) => {
    const ang = (i / PLAT.length) * Math.PI * 2 - Math.PI / 2;
    return { ...p, x: 50 + Math.cos(ang) * R, y: 50 + Math.sin(ang) * R };
  });
  return (
    <section className="section platforms" id="platforms">
      <div className="wrap">
        <div className="section-head">
          <span className="eyebrow">One hub, every channel</span>
          <h2>Connect the platforms you already live on.</h2>
          <p>Link your accounts once — social, ads, SEO and reviews all orbit one hub. Wizora then creates, publishes, optimises and replies across every one of them, automatically. Hover to pause and explore.</p>
        </div>
        <div className="constellation">
          <div className="orbit-area">
            <div className="orbit-ring"></div>
            <div className="orbit">
              <svg className="con-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
                <defs>
                  <linearGradient id="ln" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0" stopColor="#1FD8BC" stopOpacity="0"/>
                    <stop offset="0.5" stopColor="#1FD8BC" stopOpacity="0.5"/>
                    <stop offset="1" stopColor="#1FD8BC" stopOpacity="0"/>
                  </linearGradient>
                </defs>
                {nodes.map((n, i) => (
                  <line key={i} x1="50" y1="50" x2={n.x} y2={n.y}
                    stroke="url(#ln)" strokeWidth="1" vectorEffect="non-scaling-stroke"/>
                ))}
              </svg>
              {nodes.map((n, i) => (
                <div className="node" key={i} style={{ left:n.x+"%", top:n.y+"%" }}>
                  <div className="node-spin">
                    <div className="node-dot">{n.svg}</div>
                    <div className="node-label">{n.name}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="hub"><img src="uploads/wizora_icon_transparent.png" alt="Wizora"/></div>
          </div>
        </div>
        <div className="nodes-mobile">
          {PLAT.map((p, i) => (
            <div className="node" key={i}>
              <div className="node-dot">{p.svg}</div>
              <div className="node-label">{p.name}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ─── Signup modal ─────────────────────────────────────────────────────────────
function SignupModal({ open, onClose }) {
  const [show, setShow] = React.useState(false);
  const [email, setEmail] = React.useState("");
  const [err, setErr] = React.useState("");

  React.useEffect(() => {
    if (open) {
      setShow(false); setErr(""); setEmail("");
      requestAnimationFrame(() => requestAnimationFrame(() => setShow(true)));
    }
  }, [open]);

  React.useEffect(() => {
    const onKey = e => { if (e.key === "Escape") onClose(); };
    if (open) window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, onClose]);

  if (!open) return null;

  const submit = ev => {
    ev.preventDefault();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      setErr("Enter a valid email address.");
      return;
    }
    window.location.href = `https://app.wizora.co.uk/signup?email=${encodeURIComponent(email)}`;
  };

  const G = <svg viewBox="0 0 24 24"><path fill="#EA4335" d="M12 10.2v3.9h5.5c-.24 1.5-1.7 4.4-5.5 4.4A6.5 6.5 0 1112 5.5c1.86 0 3.1.8 3.8 1.5l2.6-2.5C16.7 2.9 14.6 2 12 2a10 10 0 100 20c5.77 0 9.6-4 9.6-9.7 0-.65-.07-1.15-.16-1.65H12z"/></svg>;
  const A = <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.4 12.6c0-2.3 1.9-3.4 2-3.5-1.1-1.6-2.8-1.8-3.4-1.8-1.4-.15-2.8.85-3.5.85-.7 0-1.85-.83-3-.8-1.55.02-3 .9-3.8 2.3-1.6 2.8-.4 7 1.2 9.3.78 1.13 1.7 2.4 2.9 2.35 1.16-.05 1.6-.75 3-.75s1.8.75 3 .73c1.24-.02 2.03-1.15 2.8-2.28.88-1.3 1.24-2.56 1.26-2.62-.03-.01-2.4-.92-2.42-3.66zM14.1 5.1c.63-.78 1.06-1.85.94-2.93-.9.04-2 .6-2.66 1.37-.58.68-1.1 1.78-.96 2.82 1.01.08 2.04-.5 2.68-1.26z"/></svg>;

  return (
    <div className={"modal-scrim"+(show?" in":"")} onClick={e=>{ if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal">
        <button className="x" onClick={onClose} aria-label="Close">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
        <div className="m-brand"><img src="uploads/wizora_icon_transparent.png" alt=""/>Wizora</div>
        <h3>Create your account</h3>
        <p className="m-sub">Start free — no credit card needed.</p>
        <div className="oauth">
          <button type="button" onClick={()=>window.location.href="https://app.wizora.co.uk/auth/google"}>{G} Google</button>
          <button type="button" onClick={()=>window.location.href="https://app.wizora.co.uk/auth/apple"}>{A} Apple</button>
        </div>
        <div className="divider">OR</div>
        <form onSubmit={submit} noValidate>
          <div className="field">
            <label htmlFor="signup-email">Work email</label>
            <input
              id="signup-email"
              className={err?"err":""}
              type="email"
              value={email}
              onChange={e=>{ setEmail(e.target.value); setErr(""); }}
              placeholder="you@company.com"
              autoFocus
            />
            {err && <div className="msg">{err}</div>}
          </div>
          <button className="btn btn-primary" type="submit">
            Continue with email
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </button>
        </form>
        <p className="m-foot">Already have an account? <a href="https://app.wizora.co.uk">Sign in</a></p>
        <p className="m-terms">
          By signing up you agree to Wizora's{" "}
          <a href="terms.html" target="_blank" rel="noopener">Terms of Service</a>
          {" "}and{" "}
          <a href="privacy.html" target="_blank" rel="noopener">Privacy Policy</a>.
        </p>
      </div>
    </div>
  );
}
